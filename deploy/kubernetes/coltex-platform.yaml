apiVersion: v1
kind: Namespace
metadata:
  name: coltex
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: coltex-config
  namespace: coltex
data:
  platform.yaml: |
    server:
      host: 0.0.0.0
      port: 8080
    llm:
      provider: mock
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: coltex-data
  namespace: coltex
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: coltex-api
  namespace: coltex
  labels:
    app: coltex-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: coltex-api
  template:
    metadata:
      labels:
        app: coltex-api
    spec:
      containers:
        - name: coltex-api
          image: coltex/platform:4.0.0
          ports:
            - containerPort: 8080
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: coltex-secrets
                  key: openai-api-key
                  optional: true
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /app/config/platform.yaml
              subPath: platform.yaml
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
            limits:
              memory: "8Gi"
              cpu: "2000m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: coltex-data
        - name: config
          configMap:
            name: coltex-config
---
apiVersion: v1
kind: Service
metadata:
  name: coltex-api
  namespace: coltex
spec:
  selector:
    app: coltex-api
  ports:
    - port: 80
      targetPort: 8080
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: coltex-api-hpa
  namespace: coltex
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: coltex-api
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
